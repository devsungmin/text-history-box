name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes from commits
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --format="- %s" "$GITHUB_REF_NAME")
          else
            COMMITS=$(git log --format="- %s" "${PREV_TAG}..${GITHUB_REF_NAME}")
          fi
          {
            echo "BODY<<EOF"
            echo "## Changes"
            echo ""
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: swift build -c release

      - name: Create .app bundle
        run: |
          APP_NAME="TextHistoryBox"
          APP_BUNDLE=".build/${APP_NAME}.app"
          mkdir -p "${APP_BUNDLE}/Contents/MacOS"
          mkdir -p "${APP_BUNDLE}/Contents/Resources"
          cp .build/release/${APP_NAME} "${APP_BUNDLE}/Contents/MacOS/${APP_NAME}"
          cp Info.plist "${APP_BUNDLE}/Contents/Info.plist"
          cp AppIcon.icns "${APP_BUNDLE}/Contents/Resources/AppIcon.icns"

      - name: Create DMG
        run: |
          APP_NAME="TextHistoryBox"
          VERSION="${{ steps.version.outputs.VERSION }}"
          DMG_DIR=".build/dmg"
          mkdir -p "${DMG_DIR}"
          cp -R ".build/${APP_NAME}.app" "${DMG_DIR}/"
          ln -s /Applications "${DMG_DIR}/Applications"
          hdiutil create -volname "${APP_NAME}" \
            -srcfolder "${DMG_DIR}" \
            -ov -format UDZO \
            ".build/${APP_NAME}-${VERSION}.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.BODY }}
          files: .build/TextHistoryBox-${{ steps.version.outputs.VERSION }}.dmg

      - name: Calculate DMG SHA256
        id: sha256
        run: echo "SHA256=$(shasum -a 256 .build/TextHistoryBox-${{ steps.version.outputs.VERSION }}.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew Tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA256="${{ steps.sha256.outputs.SHA256 }}"
          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/devsungmin/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          mkdir -p Casks
          cat > Casks/text-history-box.rb << 'EOF'
          cask "text-history-box" do
            version "__VERSION__"
            sha256 "__SHA256__"

            url "https://github.com/devsungmin/text-history-box/releases/download/v#{version}/TextHistoryBox-#{version}.dmg"
            name "TextHistoryBox"
            desc "Text history clipboard manager for macOS"
            homepage "https://github.com/devsungmin/text-history-box"

            depends_on macos: ">= :ventura"

            app "TextHistoryBox.app"
          end
          EOF
          sed -i '' 's/^          //' Casks/text-history-box.rb
          sed -i '' "s/__VERSION__/${VERSION}/" Casks/text-history-box.rb
          sed -i '' "s/__SHA256__/${SHA256}/" Casks/text-history-box.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/text-history-box.rb
          git commit -m "Update text-history-box to ${VERSION}"
          git push
